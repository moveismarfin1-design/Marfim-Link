<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Móveis Marfim</title>
<style>
  :root {
    --royal: #F2EDE4;
    --royal-deep: #E6DCC8;
    --royal-light: #D9CBA8;
    --wood: #8C6A4F;
    --wood-dark: #5E4530;
    --ink: #2B2620;
    --ink-soft: #6B6358;
    --card-border: #E6DCC8;
    --icon-bg: #E6DCC8;
    --muted-on-card: #6B6358;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    background: var(--royal);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 48px 20px;
  }
  .card {
    width: 100%;
    max-width: 420px;
  }
  .brand {
    text-align: center;
    margin-bottom: 36px;
  }
  .brand img {
    width: 220px;
    max-width: 80%;
    margin: 0 auto;
    display: block;
  }
  .brand p {
    font-size: 12px;
    color: var(--ink-soft);
    margin-top: 4px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .links {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  a.link {
    display: flex;
    align-items: center;
    gap: 14px;
    background: #FFFDF9;
    border: 1px solid var(--card-border);
    border-radius: 14px;
    padding: 16px 18px;
    text-decoration: none;
    color: var(--ink);
    transition: transform 0.12s ease, border-color 0.12s ease;
  }
  a.link:active {
    transform: scale(0.98);
  }
  a.link:hover {
    border-color: var(--wood);
  }
  .icon {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    background: var(--icon-bg);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .icon svg { width: 20px; height: 20px; }
  .text { flex: 1; }
  .text .label {
    font-size: 15px;
    font-weight: 600;
  }
  .text .sub {
    font-size: 13px;
    color: var(--muted-on-card);
    margin-top: 2px;
  }
  .arrow {
    color: var(--muted-on-card);
    font-size: 18px;
  }
  footer {
    text-align: center;
    margin-top: 40px;
    font-size: 12px;
    color: var(--ink-soft);
  }
</style>
</head>
